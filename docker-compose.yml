version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: school_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/school_management
      JWT_SECRET: your-secret-key
      PORT: 5000
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules

  biometric-service:
    build: ./biometric-service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/school_management
    depends_on:
      - postgres
    volumes:
      - ./biometric-service:/app

  ai-service:
    build: ./ai-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/school_management
    depends_on:
      - postgres
    volumes:
      - ./ai-service:/app

volumes:
  postgres_data:
